<!DOCTYPE html>
<html lang="zh-Hant" data-theme="system">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manga_downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <a class="skip-link" href="#main-content" data-i18n="skip.main">跳至主要內容</a>
  <header class="site-header">
    <div class="site-brand">
      <h1 class="site-title">Manga_downloader</h1>
      <p class="site-tagline" data-i18n="site.tagline">本機漫畫下載控制台</p>
    </div>
    <div class="header-controls">
      <div class="lang-control">
        <label for="lang-select" data-i18n="nav.lang">介面語言</label>
        <select id="lang-select" data-i18n-aria-label="nav.lang.aria" aria-label="Interface language">
          <option value="zh-Hant">繁體中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="theme-control">
        <label for="theme-select" data-i18n="nav.theme">主題</label>
        <select id="theme-select" data-i18n-aria-label="nav.theme.aria" aria-label="Theme">
          <option value="light" data-i18n-opt="theme.light">淺色</option>
          <option value="dark" data-i18n-opt="theme.dark">深色</option>
          <option value="system" data-i18n-opt="theme.system">跟隨系統</option>
        </select>
      </div>
    </div>
  </header>

  <main id="main-content">
    <p class="hint" data-i18n="hint.env">本機設定（.env）。Cookie 欄位載入後為遮罩；若不變更請勿覆寫為其他字串。</p>

    <section class="panel" aria-labelledby="env-heading">
      <h2 id="env-heading" data-i18n="section.env">環境變數</h2>
      <form id="env-form">
        <label>
          <span data-i18n="env.cookies">Cookie（MANGA_COOKIES）</span>
          <textarea name="MANGA_COOKIES" rows="3" data-i18n-placeholder="ph.masked" placeholder="***masked***"></textarea>
        </label>
        <label>
          <span data-i18n="env.res">視窗解析度 WxH（MANGA_RES）</span>
          <input name="MANGA_RES" />
        </label>
        <label>
          <span data-i18n="env.sleep">翻頁間隔秒數（MANGA_SLEEP_TIME）</span>
          <input name="MANGA_SLEEP_TIME" type="text" />
        </label>
        <label>
          <span data-i18n="env.ids">漫畫 ID 清單（MANGA_IDS）</span>
          <input name="MANGA_IDS" />
        </label>
        <div
          class="paste-id-block"
          role="group"
          data-i18n-aria-label="paste.group.aria"
          aria-label="從 viewer 網址解析並附加至漫畫 ID 清單"
        >
          <div class="paste-id-block__head">
            <span class="paste-id-block__title" data-i18n="paste.title">從網址輔助填入</span>
            <span class="paste-id-block__hint" data-i18n="paste.hint">選用，不影響儲存鈕</span>
          </div>
          <div class="paste-id-row">
            <input
              id="viewer-url-paste"
              type="url"
              inputmode="url"
              autocomplete="off"
              data-i18n-placeholder="ph.viewer_url"
              placeholder="貼上完整 viewer 網址"
            />
            <button type="button" id="btn-append-id" class="btn-secondary" data-i18n="paste.append">從網址加入 ID</button>
          </div>
        </div>
        <label>
          <span data-i18n="env.viewer_tpl">Viewer 網址模板（MANGA_VIEWER_URL_TEMPLATE）</span>
          <input name="MANGA_VIEWER_URL_TEMPLATE" data-i18n-placeholder="ph.optional_tpl" placeholder="選填，須含 {id}" />
        </label>
        <label>
          <span data-i18n="env.headless">Headless 模式（MANGA_HEADLESS）</span>
          <input name="MANGA_HEADLESS" data-i18n-placeholder="ph.optional_headless" placeholder="選填：new / old / 0" />
        </label>
        <button type="submit" class="btn-primary" data-i18n="env.save">儲存</button>
      </form>
      <p id="env-msg" class="msg" aria-live="polite"></p>
    </section>

    <section class="panel" aria-labelledby="download-heading">
      <h2 id="download-heading" data-i18n="section.download">下載</h2>
      <button type="button" id="btn-start" class="btn-primary" data-i18n="download.start">開始下載</button>
      <p id="start-msg" class="msg" aria-live="polite"></p>
    </section>

    <section class="panel progress-panel" aria-labelledby="progress-heading">
      <div class="progress-panel__head">
        <h2 id="progress-heading" data-i18n="section.progress">進度</h2>
        <p class="progress-panel__subtitle" data-i18n="progress.subtitle">多篇時依各書頁數加權估算整體完成度</p>
      </div>
      <div
        id="download-progress"
        class="progress-meter"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        aria-valuetext="0%"
        data-i18n-aria-label="progress.aria.bar"
        aria-label="下載整體進度百分比"
      >
        <div id="progress-fill" class="progress-fill">
          <span class="progress-fill__shimmer" aria-hidden="true"></span>
        </div>
      </div>
      <div class="progress-meta">
        <span id="progress-pct" class="progress-pct">0%</span>
        <p id="progress-label" class="progress-label" aria-live="polite" data-i18n="progress.wait">等待開始…</p>
      </div>
    </section>

    <section class="panel panel--terminal" aria-labelledby="log-heading">
      <h2 id="log-heading" data-i18n="section.log">Log</h2>
      <pre
        id="log"
        class="log"
        tabindex="0"
        data-i18n-aria-label="log.aria"
        aria-label="下載事件與日誌（SSE JSON）"
      ></pre>
    </section>
  </main>
  <script src="/static/i18n.js" defer></script>
  <script src="/static/app.js" defer></script>
</body>
</html>
