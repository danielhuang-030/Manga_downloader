# Compose 預設會讀取專案根目錄 `.env` 做 YAML 變數替換；cookie 字串裡的 `$` 會觸發 WARN。
# 建議執行時加上：--env-file compose.env
#
# Web UI 對外連接埠（僅 Compose 映射用，可寫入專案根目錄 `.env` 供變數替換）：
#   MANGA_WEB_PORT=9000 表示主機 9000 → 容器內固定 8765（應用程式內監聽埠為 hard code）。
#
# python 服務強制 command: sleep infinity，覆寫映像 CMD（避免沿用舊映像的 python main.py）。
# 手動下載示例：
#   docker compose run --rm python python main_env.py
#   docker compose run --rm python python main.py
#
# 跑測試（與 Dockerfile 相同環境，專案掛載為 /app）：
#   ./scripts/docker-test.sh
# 或：
#   docker compose --env-file compose.env run --rm python python -m pytest tests/ -v
#
# Web UI：docker compose up web
services:
  python:
    container_name: mangadw
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sleep", "infinity"]
    # Extra shared memory reduces Chrome "tab crashed" in headless (with --disable-dev-shm-usage in code).
    shm_size: "2gb"
    volumes:
      - .:/app

  web:
    container_name: mangadw-web
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "${MANGA_WEB_PORT:-8765}:8765"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "web_app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8765",
      ]